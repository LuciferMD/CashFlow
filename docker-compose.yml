services:
  api:
    container_name: auth
    build:
      context: ./Api/Auth
      dockerfile: Dockerfile
    ports:
      - "8080:80"
      - "8443:443"
    environment:
      - ASPNETCORE_URLS=https://+443;http://+80
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/app/https/cert.pem
      - ASPNETCORE_Kestrel__Certificates__Default__KeyPath=/app/https/key.pem
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DatabaseConnectionString=Host=localhost;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  migrations:
    container_name: auth-migrations
    build:
      context: ./Api/Auth
      dockerfile: Dockerfile.migrations
    environment:
       - ConnectionStrings__DatabaseConnectionString=Host=localhost;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["dotnet", "ef", "database", "update"]

  postgres:
    image: postgres:alpine
    restart: always
    container_name: postgres
    healthcheck:
        test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
        interval: 10s
        timeout: 5s
        retries: 5
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports: 
     - "5432:5432"
    
  web:
    build:
      context: ./Web/web
      dockerfile: Dockerfile
    ports:
      - "3000:5173"
    environment:
      NODE_ENV: development
    volumes:
      - ./Web/web/.vite/cert:/react-app/.vite/cert:ro
    stdin_open: true
    tty: true
    command: npm run dev -- --host


volumes:
 postgres_data:
